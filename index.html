<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>FB Auction Pro v10.2 | Firebase Only</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    :root { --primary: #1a73e8; --success: #0d9488; --danger: #dc2626; --warning: #f59e0b; --info: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; --radius: 16px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 30%, #ecfdf5 100%); min-height: 100vh; color: var(--text); }

    .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 90vw; width: 500px; pointer-events: none; }
    .toast { pointer-events: all; padding: 14px 18px; border-radius: 12px; color: white; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideIn 0.4s ease; font-size: 0.9rem; cursor: pointer; }
    .toast-success { background: linear-gradient(135deg, #059669, #10b981); }
    .toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); }
    .toast-warning { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .toast-info { background: linear-gradient(135deg, #2563eb, #3b82f6); }
    @keyframes slideIn { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }

    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); }
    .login-box { background: white; border-radius: 24px; padding: 36px; width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 20px; }
    .login-logo h1 { font-size: 1.4rem; color: #1e293b; }
    .input-group { margin-bottom: 14px; }
    .input-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
    .input-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; }
    .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }

    .app-container { display: none; }
    .app-container.logged-in { display: block; }
    .header { background: linear-gradient(135deg, #1e3a5f 0%, #1a365d 100%); color: white; padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
    .header-content { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .logo { font-size: 1.2rem; font-weight: 700; }
    .logout-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 16px; cursor: pointer; font-size: 0.8rem; }

    .main-container { max-width: 1300px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
    @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
    .sidebar { background: var(--card-bg); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); height: fit-content; position: sticky; top: 70px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; font-weight: 500; font-size: 0.9rem; }
    .nav-item:hover { background: #f1f5f9; }
    .nav-item.active { background: #dbeafe; color: var(--primary); font-weight: 600; }
    .nav-item .badge { margin-left: auto; background: var(--primary); color: white; padding: 2px 7px; border-radius: 10px; font-size: 0.7rem; }
    .nav-item.highlight { background: #fef3c7; border: 1px solid #f59e0b; font-weight: 700; animation: glowPulse 2s infinite; }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 5px rgba(245,158,11,0.3); } 50% { box-shadow: 0 0 15px rgba(245,158,11,0.6); } }

    .card { background: var(--card-bg); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 14px; }
    .card-header { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .page-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
    .page-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s; }
    .page-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

    .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.85rem; transition: all 0.2s; text-align: center; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-info { background: var(--info); color: white; }
    .btn-outline { background: white; border: 1px solid var(--primary); color: var(--primary); }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
    .btn-lg { padding: 14px 24px; font-size: 1rem; }
    .btn-block { width: 100%; }
    
    .btn-submit {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(5,150,105,0.4);
      animation: pulse 2s infinite;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(5,150,105,0.6); }
    @keyframes pulse { 0%,100% { box-shadow: 0 6px 20px rgba(5,150,105,0.4); } 50% { box-shadow: 0 8px 30px rgba(5,150,105,0.7); } }

    input, select, textarea { padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.9rem; width: 100%; background: #f8fafc; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    textarea { resize: vertical; min-height: 100px; font-family: inherit; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: white; border-radius: var(--radius); padding: 28px; max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; }

    .log-container { background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 10px; max-height: 220px; overflow-y: auto; font-family: monospace; font-size: 0.78rem; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #1e293b; }
    .log-success { color: #4ade80; } .log-error { color: #f87171; }

    .post-type-selector { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .post-type-btn { flex: 1; min-width: 90px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; cursor: pointer; font-weight: 600; font-size: 0.85rem; background: white; transition: all 0.2s; }
    .post-type-btn:hover { border-color: var(--primary); }
    .post-type-btn.active { border-color: var(--primary); background: #dbeafe; color: var(--primary); }

    .token-help { background: #fffbeb; border: 2px solid #f59e0b; border-radius: 10px; padding: 14px; margin: 10px 0; }

    .quick-post-panel {
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      border: 2px solid #22c55e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .quick-post-panel h3 { color: #059669; margin-bottom: 12px; font-size: 1.2rem; }
    .page-select-card {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer;
      margin: 6px 0; transition: all 0.2s; background: white;
    }
    .page-select-card:hover { border-color: var(--primary); }
    .page-select-card.selected { border-color: #22c55e; background: #f0fdf4; }
    .page-select-card .radio { width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 50%; flex-shrink: 0; }
    .page-select-card.selected .radio { border-color: #22c55e; background: #22c55e; }

    .data-version { font-size: 0.7rem; opacity: 0.7; margin-left: 10px; }
    .data-status { background: #22c55e20; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; color: #059669; }
    
    .sheet-url-input { font-size: 0.8rem; color: #64748b; word-break: break-all; }

    .readonly-field { background: #f1f5f9; color: #64748b; cursor: not-allowed; }
    .editable-field { background: #fff; color: #1e293b; border-color: var(--primary); }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Login -->
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <div class="login-logo"><h1>🔐 FB Auction Pro v10.2</h1><p style="color:#64748b;">Quick Manual Post + Firebase</p></div>
    <div class="input-group"><label>📱 Phone</label><input type="tel" id="loginPhone" value="01700000000" maxlength="11"></div>
    <div class="input-group"><label>🔒 Password</label><input type="password" id="loginPassword" value="admin123"></div>
    <button class="login-btn" onclick="handleLogin()">🔓 Login</button>
  </div>
</div>

<!-- App -->
<div id="appScreen" class="app-container">
  <div class="header">
    <div class="header-content">
      <div class="logo">📢 FB Auction Pro v10.2 <span class="data-version" id="dataVersion"></span></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:0.85rem;">
        <span id="clockDisplay">--:--</span>
        <span>Pages: <strong id="totalPagesCount">0</strong></span>
        <span id="loggedUserDisplay"></span>
        <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="nav-item highlight" data-view="quickpost">⚡ Quick Post</div>
      <div class="nav-item active" data-view="dashboard">📊 Dashboard</div>
      <div class="nav-item" data-view="pages">📄 Pages <span class="badge" id="navPageCount">0</span></div>
      <div class="nav-item" data-view="sheets">📋 Sheets</div>
      <div class="nav-item" data-view="schedule">⏰ Schedules</div>
      <div class="nav-item" data-view="help">❓ Token Guide</div>
      <div class="nav-item" data-view="logs">📝 Logs</div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="pageModal" style="display:none;"><div class="modal" id="pageModalContent"></div></div>
<div class="modal-overlay" id="manualPostModal" style="display:none;"><div class="modal" id="manualPostModalContent"></div></div>
<div class="modal-overlay" id="sheetEditModal" style="display:none;"><div class="modal" id="sheetEditModalContent"></div></div>

<script>
// ==================== FIREBASE (SILENT) ====================
const firebaseConfig = {
  apiKey: "AIzaSyAiyV07TXuzSC2o65WKKxn2mBW_MgWAQTw",
  authDomain: "facebook-1364a.firebaseapp.com",
  projectId: "facebook-1364a",
  storageBucket: "facebook-1364a.firebasestorage.app",
  messagingSenderId: "537326694325",
  appId: "1:537326694325:web:bd83f07d82980ea0cef3fc"
};
let _db = null, _fbReady = false;
try { firebase.initializeApp(firebaseConfig); _db = firebase.firestore(); _db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); _fbReady = true; } catch(e) {}
async function _fbSave() { if(!_fbReady||!_db)return; try{await _db.collection('auction_data').doc('user_01700000000').set({pages:APP.pages,sheets:Object.fromEntries(Object.entries(APP.sheets).map(([k,v])=>[k,{url:v.url,data:v.data}])),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){} }
async function _fbLoad() { if(!_fbReady||!_db)return false; try{const d=await _db.collection('auction_data').doc('user_01700000000').get({source:'server'});if(d.exists){const data=d.data();if(data.pages)APP.pages=data.pages;if(data.sheets){APP.sheets=data.sheets;Object.keys(APP.sheets).forEach(k=>{if(!APP.sheets[k].data)APP.sheets[k].data={rows:[]};});}return true;}return false;}catch(e){return false;} }

// ==================== TOAST NOTIFICATIONS ====================
const Toast = {
  show(msg, type='info', dur=4000) {
    const t = document.createElement('div'); t.className = `toast toast-${type}`;
    t.innerHTML = `${type==='success'?'✅':type==='error'?'❌':type==='warning'?'⚠️':'ℹ️'} ${msg}`;
    document.getElementById('toastContainer').appendChild(t);
    t.addEventListener('click', () => t.remove()); setTimeout(() => t.remove(), dur);
  },
  success(m,d){this.show(m,'success',d);}, 
  error(m,d){this.show(m,'error',d||10000);}, 
  warning(m,d){this.show(m,'warning',d);}, 
  info(m,d){this.show(m,'info',d);}
};

// ==================== AUTHENTICATION ====================
function handleLogin() {
  if (document.getElementById('loginPhone').value.trim()==='01700000000' && 
      document.getElementById('loginPassword').value.trim()==='admin123') {
    localStorage.setItem('fbSession', JSON.stringify({phone:'01700000000',time:Date.now()}));
    document.getElementById('loginScreen').style.display='none'; 
    document.getElementById('appScreen').classList.add('logged-in');
    document.getElementById('loggedUserDisplay').textContent='👤 01700000000';
    initApp(); 
    Toast.success('Welcome! ⚡ Quick Post available');
  } else { Toast.error('Use: 01700000000 / admin123'); }
}

function handleLogout() { _fbSave(); localStorage.removeItem('fbSession'); location.reload(); }

// ==================== APP STATE ====================
const APP = { pages: [], sheets: {}, activeView: 'dashboard', autoInterval: null, logs: [], selectedQuickPage: null, dataVersion: '1.0', quickPostCache: {} };

function saveState() { _fbSave(); }

function addLog(msg,type='info'){
  APP.logs.unshift({time:new Date().toISOString(),msg,type});
  const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
  APP.logs = APP.logs.filter(log => { const logTime = new Date(log.time).getTime(); return logTime > twentyFourHoursAgo; });
  if(type==='success') Toast.success(msg); else if(type==='error') Toast.error(msg,15000); else if(type==='warning') Toast.warning(msg);
}

// ==================== SHEET FUNCTIONS ====================
async function fetchSheet(name){
  const s=APP.sheets[name]; if(!s?.url) throw new Error('No URL');
  let csvUrl = s.url;
  if (csvUrl.includes('docs.google.com/spreadsheets')) { const match = csvUrl.match(/\/d\/([a-zA-Z0-9-_]+)/); if (match) { const sheetId = match[1]; csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`; } }
  const res = await fetch(csvUrl); const csv = await res.text(); const rows=[];
  csv.split(/\r?\n/).filter(l=>l.trim()).forEach(line=>{ const cols=[]; let cur='',inQ=false; for(let ch of line){ if(ch==='"') inQ=!inQ; else if(ch===','&&!inQ){ cols.push(cur.trim()); cur=''; } else cur+=ch; } cols.push(cur.trim()); rows.push(cols); });
  APP.sheets[name].data={rows, lastFetched: Date.now()}; saveState();
}
function getCell(sheetName,cell){
  const s=APP.sheets[sheetName]; if(!s?.data?.rows?.length) return null;
  const col=cell.charCodeAt(0)-65; const row=parseInt(cell.substring(1))-1;
  if(row>=0&&row<s.data.rows.length&&col>=0&&col<s.data.rows[row].length) return String(s.data.rows[row][col]).trim()||null;
  return null;
}

// ==================== TOKEN CHECKER ====================
async function checkTokenDetails(token) {
  const results = { valid: false, type: 'unknown', pageName: null, pageId: null, permissions: [], canPost: false, isPageToken: false, errors: [] };
  try { const meRes = await fetch(`https://graph.facebook.com/v18.0/me?access_token=${token}`); const meData = await meRes.json(); if (meData.error) { results.errors.push('Token invalid or expired: ' + meData.error.message); return results; } results.valid = true; if (meData.name && meData.id) { results.pageName = meData.name; results.pageId = meData.id; results.type = '✅ PAGE TOKEN'; results.isPageToken = true; } else if (meData.id && !meData.name) { results.type = '❌ USER TOKEN'; results.errors.push('This is a USER token. Get a PAGE token!'); } } catch (e) { results.errors.push('Cannot connect to Facebook API'); return results; }
  try { const permRes = await fetch(`https://graph.facebook.com/v18.0/me/permissions?access_token=${token}`); const permData = await permRes.json(); if (permData.data) { results.permissions = permData.data.filter(p => p.status === 'granted').map(p => p.permission); if (results.permissions.includes('pages_manage_posts') && results.permissions.includes('pages_read_engagement')) { results.canPost = true; } else { if (!results.permissions.includes('pages_manage_posts')) results.errors.push('Missing: pages_manage_posts'); if (!results.permissions.includes('pages_read_engagement')) results.errors.push('Missing: pages_read_engagement'); } } } catch (e) { }
  if (!results.isPageToken) results.canPost = false;
  return results;
}

// ==================== FACEBOOK API ====================
async function postToFacebook(pageToken, message, pageId) {
  const url = `https://graph.facebook.com/v18.0/me/feed`; const params = new URLSearchParams(); params.append('message', message); params.append('access_token', pageToken);
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }); const result = await res.json();
  if (result.error) { if (result.error.code === 200) { throw new Error('ERROR: You are using a USER token. Get a PAGE token!'); } throw new Error(`[${result.error.code}] ${result.error.message}`); }
  return result;
}
async function postPhotoToFacebook(pageToken, caption, photoUrl, pageId) {
  const url = `https://graph.facebook.com/v18.0/me/photos`; const params = new URLSearchParams(); if (caption) params.append('caption', caption); params.append('url', photoUrl); params.append('access_token', pageToken);
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }); const result = await res.json();
  if (result.error) throw new Error(`[${result.error.code}] ${result.error.message}`); return result;
}

// ==================== AUTO POST ====================
async function autoPost(page) {
  const cell = page.currentCell || 'A1'; try { await fetchSheet(page.sheetName); } catch (e) { }
  const content = getCell(page.sheetName, cell);
  if (!content) { addLog(`⏭️ ${cell} empty`,'warning'); Toast.warning(`Cell ${cell} empty!`); advanceCell(page); return null; }
  Toast.info(`📤 Posting from ${cell}...`);
  try { const result = await postToFacebook(page.token, content, page.pageId); page.stats.posts = (page.stats.posts||0) + 1; page.stats.lastPost = new Date().toISOString(); advanceCell(page); saveState(); addLog(`✅ Posted! ID:${result.id}`,'success'); Toast.success(`✅ Posted! Next:${page.currentCell}`); return result; } catch (e) { addLog(`❌ ${e.message}`,'error'); Toast.error(e.message, 15000); return null; }
}
function advanceCell(page) { const col = page.currentCell.charAt(0); page.currentCell = col + (parseInt(page.currentCell.substring(1)) + 1); saveState(); }

// ==================== QUICK POST VIEW ====================
let quickPostType = 'text'; let quickPostTextContent = '';
function renderQuickPostView() {
  document.getElementById('contentArea').innerHTML = `
    <div class="quick-post-panel"><h3>⚡ Quick Manual Post</h3><p style="color:#64748b;margin-bottom:16px;">Write text, select page, click SUBMIT → Posted!</p><p style="color:#94a3b8;font-size:0.8rem;margin-bottom:12px;">⚠️ Quick Post content is temporary and will not be saved.</p>
      <label style="font-weight:700;margin-bottom:8px;display:block;">📄 Select Page:</label><div style="margin-bottom:16px;">
        ${APP.pages.length === 0 ? '<p style="color:#dc2626;">❌ No pages! Add a page first from 📄 Pages menu.</p>' : APP.pages.map(p => `<div class="page-select-card ${APP.selectedQuickPage === p.id ? 'selected' : ''}" onclick="selectQuickPage('${p.id}')"><div class="radio"></div><div><strong>📘 ${p.name}</strong><span style="font-size:0.8rem;color:#64748b;margin-left:8px;">📍 ${p.currentCell||'A1'} | 📊 ${p.stats?.posts||0} posts</span></div></div>`).join('')}
      </div>
      ${APP.selectedQuickPage ? `<label style="font-weight:700;margin-bottom:8px;display:block;">📌 Post Type:</label><div class="post-type-selector"><div class="post-type-btn ${quickPostType==='text'?'active':''}" onclick="quickPostType='text';renderQuickPostView();">📝 Write Text</div><div class="post-type-btn ${quickPostType==='cell'?'active':''}" onclick="quickPostType='cell';renderQuickPostView();">📋 Use Cell</div><div class="post-type-btn ${quickPostType==='photo'?'active':''}" onclick="quickPostType='photo';renderQuickPostView();">🖼️ Photo</div></div>
      ${quickPostType==='text' ? `<div style="margin-bottom:16px;"><label style="font-weight:700;">📝 Your Post Text:</label><textarea id="quickPostText" rows="5" placeholder="Write your post here...">${quickPostTextContent}</textarea><div style="text-align:right;font-size:0.8rem;color:#94a3b8;"><span id="quickCharCount">${quickPostTextContent.length}</span> chars</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;">⚠️ This text is temporary and will not be saved</div></div>` : ''}
      ${quickPostType==='cell' ? `<div style="margin-bottom:16px;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px;"><strong>📋 Cell ${(()=>{const p=APP.pages.find(x=>x.id===APP.selectedQuickPage);return p?p.currentCell||'A1':'A1';})()}:</strong><br><span style="font-size:1rem;">${(()=>{const p=APP.pages.find(x=>x.id===APP.selectedQuickPage);return p?getCell(p.sheetName,p.currentCell||'A1')||'(Empty)':'(No page)';})()}</span></div>` : ''}
      ${quickPostType==='photo' ? `<div style="margin-bottom:16px;"><label style="font-weight:700;">🖼️ Photo URL:</label><input id="quickPhotoUrl" placeholder="https://example.com/image.jpg"><label style="font-weight:700;margin-top:8px;">📝 Caption (optional):</label><textarea id="quickPhotoCaption" rows="3" placeholder="Caption..."></textarea></div>` : ''}

      ${APP.selectedQuickPage ? `<div style="text-align:center;margin-top:10px;font-size:0.8rem;color:#64748b;">⚡ Posting to: <strong>${APP.pages.find(p=>p.id===APP.selectedQuickPage)?.name||'?'}</strong></div>` : ''}

function selectQuickPage(pageId) { APP.selectedQuickPage = pageId; saveState(); renderQuickPostView(); }
async function executeQuickPost() {
  if (!APP.selectedQuickPage) { Toast.error('Select a page first!'); return; }

    if (quickPostType === 'text') { const msg = document.getElementById('quickPostText').value.trim(); if (!msg) { Toast.error('Write some text!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT - POST TO FACEBOOK NOW'; btn.style.background = 'linear-gradient(135deg, #059669, #10b981)'; } return; } await postToFacebook(page.token, msg, page.pageId); }
    else if (quickPostType === 'cell') { const cell = page.currentCell || 'A1'; try { await fetchSheet(page.sheetName); } catch(e){} const msg = getCell(page.sheetName, cell); if (!msg) { Toast.error('Cell is empty!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; btn.style.background = 'linear-gradient(135deg, #059669, #10b981)'; } return; } await postToFacebook(page.token, msg, page.pageId); advanceCell(page); }
    else if (quickPostType === 'photo') { const url = document.getElementById('quickPhotoUrl').value.trim(); const cap = document.getElementById('quickPhotoCaption').value.trim(); if (!url) { Toast.error('Enter photo URL!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; btn.style.background = 'linear-gradient(135deg, #059669, #10b981)'; } return; } await postPhotoToFacebook(page.token, cap, url, page.pageId); }
    page.stats.posts = (page.stats.posts||0) + 1; page.stats.lastPost = new Date().toISOString(); saveState(); addLog('✅ Quick post success!','success'); Toast.success('✅ Posted successfully!'); quickPostTextContent = ''; renderQuickPostView();
  } catch (e) { addLog(`❌ ${e.message}`,'error'); Toast.error(e.message, 15000); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT - POST TO FACEBOOK NOW'; btn.style.background = 'linear-gradient(135deg, #059669, #10b981)'; } }
}

button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="document.getElementById('manualPostModal').style.display='none'">Cancel</button>`;

function selectPostType(type, pageId) { currentPostType = type; document.querySelectorAll('.post-type-btn').forEach(b => b.classList.remove('active')); document.getElementById('type'+type.charAt(0).toUpperCase()+type.slice(1)).classList.add('active'); document.getElementById('customTextSection').style.display = type==='custom'?'block':'none'; document.getElementById('cellPreviewSection').style.display = type==='cell'?'block':'none'; document.getElementById('photoSection').style.display = type==='photo'?'block':'none'; }
async function executeManualPost(pageId) { const page = APP.pages.find(p => p.id === pageId); if (!page) return; const btn = document.getElementById('submitManualPostBtn'); if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Posting...'; }
  try { if (currentPostType === 'custom') { const msg = document.getElementById('manualPostText').value.trim(); if (!msg) { Toast.error('Write text!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; } return; } await postToFacebook(page.token, msg, page.pageId); } else if (currentPostType === 'cell') { const cell = page.currentCell||'A1'; try { await fetchSheet(page.sheetName); } catch(e){} const msg = getCell(page.sheetName, cell); if (!msg) { Toast.error('Cell empty!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; } return; } await postToFacebook(page.token, msg, page.pageId); advanceCell(page); } else if (currentPostType === 'photo') { const url = document.getElementById('photoUrl').value.trim(); const cap = document.getElementById('photoCaption').value.trim(); if (!url) { Toast.error('Enter URL!'); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; } return; } await postPhotoToFacebook(page.token, cap, url, page.pageId); }
    page.stats.posts = (page.stats.posts||0) + 1; page.stats.lastPost = new Date().toISOString(); saveState(); addLog('✅ Manual post!','success'); Toast.success('✅ Posted!'); document.getElementById('manualPostModal').style.display = 'none'; renderDashboard(); } catch (e) { addLog(`❌ ${e.message}`,'error'); Toast.error(e.message, 15000); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 SUBMIT'; } } }

function checkSchedules() { const now = new Date(); const ct = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`; const today = now.toISOString().split('T')[0]; APP.pages.forEach(page => { (page.schedules||[]).forEach(sch => { if (sch.enabled && sch.time===ct && sch.lastRun!==today) { sch.lastRun = today; saveState(); addLog(`⏰ Schedule: "${page.name}"`,'warning'); autoPost(page); } }); }); }

t 24 Hours)</div><div class="log-container">${APP.logs.slice(0,20).map(l=>`<div class="log-entry"><span class="${l.type==='success'?'log-success':l.type==='error'?'log-error':'log-info'}">${new Date(l.time).toLocaleString()} - ${l.msg}</span></div>`).join('')}${APP.logs.length === 0 ? '<div style="color:#94a3b8;">No logs yet</div>' : ''}</div></div>`; }
async function checkAndSaveToken(pageId) { const page = APP.pages.find(p => p.id === pageId); if (!page) return; Toast.info('Checking token...'); const r = await checkTokenDetails(page.token);

async function addPage() { const n = document.getElementById('npName').value.trim(); const s = document.getElementById('npSheet').value; const t = document.getElementById('npToken').value.trim(); const c = document.getElementById('npCell').value.trim()||'A1'; if(!n || !t) { Toast.error('Name and Token required!'); return; } if(s === 'No sheets - Add a sheet first') { Toast.error('Please add a sheet first!'); return; }

function toggleEditMode(pid) {
  const nameInput = document.getElementById('epName');
  const tokenInput = document.getElementById('epToken');
  const sheetSelect = document.getElementById('epSheet');
  const cellInput = document.getElementById('epCell');
  const editBtn = document.getElementById('toggleEditBtn');
  const saveBtn = document.getElementById('saveEditBtn');
  const badge = document.getElementById('editModeBadge');
  const isReadonly = nameInput.readOnly;
  if (isReadonly) {
    nameInput.readOnly = false; nameInput.classList.remove('readonly-field'); nameInput.classList.add('editable-field'); nameInput.focus();
    tokenInput.readOnly = false; tokenInput.classList.remove('readonly-field'); tokenInput.classList.add('editable-field');
    sheetSelect.disabled = false; sheetSelect.classList.remove('readonly-field'); sheetSelect.style.background = '#fff'; sheetSelect.style.color = '#1e293b';
    cellInput.readOnly = false; cellInput.classList.remove('readonly-field'); cellInput.classList.add('editable-field');
    editBtn.textContent = '👁️ View'; editBtn.classList.add('btn-info'); saveBtn.style.display = 'inline-flex'; badge.textContent = '(Edit Mode)'; badge.style.color = '#f59e0b';
  } else {
    nameInput.readOnly = true; nameInput.classList.add('readonly-field'); nameInput.classList.remove('editable-field');
    tokenInput.readOnly = true; tokenInput.classList.add('readonly-field'); tokenInput.classList.remove('editable-field');
    sheetSelect.disabled = true; sheetSelect.classList.add('readonly-field'); sheetSelect.style.background = '#f1f5f9'; sheetSelect.style.color = '#64748b';
    cellInput.readOnly = true; cellInput.classList.add('readonly-field'); cellInput.classList.remove('editable-field');

  }
}

function savePageEdit(pid) {
  const p = APP.pages.find(x=>x.id===pid); if(!p) return;
  const newName = document.getElementById('epName').value.trim(); const newToken = document.getElementById('epToken').value.trim();
  const newSheet = document.getElementById('epSheet').value; const newCell = document.getElementById('epCell').value.trim()||'A1';

  saveState(); Toast.success('✅ Page updated!'); toggleEditMode(pid); openPageDetail(pid);
}

function deletePage(pid){
  if(confirm('⚠️ Delete this page? All data including schedules will be permanently removed!')){
    APP.pages = APP.pages.filter(p=>p.id!==pid); saveState();
    document.getElementById('pageModal').style.display='none'; renderDashboard(); Toast.warning('🗑️ Page deleted!');
  }
}

function updSch(pid,i,t){ const p = APP.pages.find(x=>x.id===pid); if(p?.schedules[i]){ p.schedules[i].time = t; saveState(); } }
function tglSch(pid,i,e){ const p = APP.pages.find(x=>x.id===pid); if(p?.schedules[i]){ p.schedules[i].enabled = e; saveState(); } }

    </div>
    <div style="margin-bottom:6px;">
      <label style="font-weight:600;font-size:0.85rem;">📊 Current Data:</label>
      <div style="background:#f8fafc;padding:8px;border-radius:8px;font-size:0.8rem;">
        ${sheet.data?.rows?.length || 0} rows loaded | Last fetched: ${sheet.data?.lastFetched ? new Date(sheet.data.lastFetched).toLocaleString() : 'Never'}
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:12px;">
      <button class="btn btn-primary btn-sm" onclick="saveSheetEdit('${sheetName}')">💾 Save Changes</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('sheetEditModal').style.display='none'">Cancel</button>
    </div>
  `;
  
  document.getElementById('sheetEditModal').style.display = 'flex';
}

async function saveSheetEdit(oldName) {
  const newName = document.getElementById('editSheetName').value.trim();
  const newUrl = document.getElementById('editSheetUrl').value.trim();
  
  if (!newName || !newUrl) {
    Toast.error('Name and URL required!');
    return;
  }
  
  // Check if new name already exists (and it's not the same sheet)
  if (newName !== oldName && APP.sheets[newName]) {
    Toast.error('A sheet with this name already exists!');
    return;
  }
  
  // Update sheet
  const sheetData = APP.sheets[oldName];
  delete APP.sheets[oldName];
  
  APP.sheets[newName] = {
    url: newUrl,
    data: sheetData.data || { rows: [] }
  };
  
  // Update all pages that reference this sheet
  APP.pages.forEach(page => {
    if (page.sheetName === oldName) {
      page.sheetName = newName;
    }
  });
  
  saveState();
  
  // Try to fetch with new URL
  try {
    await fetchSheet(newName);
    Toast.success(`✅ Sheet updated and refreshed! (${APP.sheets[newName].data?.rows?.length || 0} rows)`);
  } catch(e) {
    Toast.warning('Sheet updated but refresh failed: ' + e.message);
  }
  
  document.getElementById('sheetEditModal').style.display = 'none';
  renderSheetsView();
}

async function refreshSheet(n){ try { await fetchSheet(n); Toast.success(`✅ ${n} refreshed! (${APP.sheets[n].data?.rows?.length || 0} rows)`); } catch(e) { Toast.error('Refresh failed: ' + e.message); } }

function delSheet(n){ 
  const pagesUsingSheet = APP.pages.filter(p => p.sheetName === n);
  let warningMsg = `Delete sheet "${n}"?`;
  if (pagesUsingSheet.length > 0) {
    warningMsg += `\n\n⚠️ ${pagesUsingSheet.length} page(s) are using this sheet: ${pagesUsingSheet.map(p => p.name).join(', ')}`;
    warningMsg += '\nThese pages will need to be reassigned to another sheet.';
  }
  
  if(confirm(warningMsg)){
    delete APP.sheets[n]; 
    saveState(); 
    renderSheetsView(); 
    Toast.warning(`🗑️ ${n} sheet deleted!`);
  } 
}

// ==================== VIEWS ====================
function renderHelpView(){ document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-header">❓ How to Get Facebook PAGE Token</div><div class="token-help"><strong>🔑 Error #200 Fix:</strong> You're using a USER token. You need a PAGE token!</div><ol style="line-height:2.2;padding-left:20px;"><li>Go to <a href="https://developers.facebook.com/tools/explorer/" target="_blank">Graph API Explorer</a></li><li>Click <strong>Generate Access Token</strong></li><li>Check: <code>pages_manage_posts</code> + <code>pages_read_engagement</code></li><li>Then: <strong>Get Token → Get Page Access Token</strong></li><li>Select your Page → Copy PAGE token (EAAB...)</li><li>Paste in app → 🧪 Check</li></ol></div><div class="card"><div class="card-header">📋 Google Sheets Setup</div><ol style="line-height:2.2;padding-left:20px;"><li>Create a Google Sheet with your content</li><li>Go to <strong>File → Share → Publish to web</strong></li><li>Select <strong>CSV</strong> format</li><li>Copy the URL and paste in Sheets section</li><li>Or use the direct sheet URL with proper sharing</li></ol></div>`; }
function renderScheduleView(){ const allSchedules = []; APP.pages.forEach(p => { (p.schedules||[]).forEach(s => { allSchedules.push({ pageName: p.name, time: s.time, enabled: s.enabled, lastRun: s.lastRun || 'Never' }); }); });
  document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-header">⏰ All Schedules</div>${allSchedules.length === 0 ? '<p style="color:#94a3b8;">No schedules configured. Add schedules from page settings.</p>' : allSchedules.map(s => `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #e2e8f0;"><div><strong>📘 ${s.pageName}</strong><span style="margin-left:12px;">⏰ ${s.time}</span></div><div><span style="color:${s.enabled ? '#059669' : '#94a3b8'};">${s.enabled ? '✅ Active' : '⏸️ Paused'}</span><span style="font-size:0.7rem;color:#94a3b8;margin-left:8px;">Last: ${s.lastRun}</span></div></div>`).join('')}</div>`; }
function renderLogsView(){ document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-header">📝 All Logs (Last 24 Hours)<span style="font-size:0.7rem;color:#94a3b8;">${APP.logs.length} entries</span></div><div class="log-container" style="max-height:500px;">${APP.logs.length === 0 ? '<div style="color:#94a3b8;text-align:center;padding:20px;">No logs yet</div>' : APP.logs.map(l=>`<div class="log-entry"><span class="${l.type==='success'?'log-success':l.type==='error'?'log-error':'log-info'}">${new Date(l.time).toLocaleString()} - ${l.msg}</span></div>`).join('')}</div></div>`; }
function renderPagesView(){ document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-header">📄 Pages <button class="btn btn-primary btn-sm" onclick="showAddPage()">➕ Add</button></div>${APP.pages.length === 0 ? '<p style="color:#94a3b8;">No pages added. Click "Add" to create one.</p>' : APP.pages.map(p=>`<div class="page-card" onclick="openPageDetail('${p.id}')"><strong>📘 ${p.name}</strong><div style="font-size:0.8rem;color:#64748b;">📍 ${p.currentCell||'A1'} | 📊 ${p.stats?.posts||0} posts | 📋 ${p.sheetName}</div><div style="font-size:0.7rem;color:#94a3b8;">${p.schedules?.length || 0} schedules</div></div>`).join('')}</div>`; }
function renderCurrentView(){ switch(APP.activeView){ case 'quickpost': renderQuickPostView(); break; case 'dashboard': renderDashboard(); break; case 'pages': renderPagesView(); break; case 'sheets': renderSheetsView(); break; case 'schedule': renderScheduleView(); break; case 'help': renderHelpView(); break; case 'logs': renderLogsView(); break; } document.getElementById('totalPagesCount').textContent = APP.pages.length; document.getElementById('navPageCount').textContent = APP.pages.length; }

// ==================== INIT (FIREBASE ONLY) ====================
async function initApp(){
  // Load from Firebase only
  await _fbLoad();
  
  document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', function() { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); this.classList.add('active'); APP.activeView = this.dataset.view; renderCurrentView(); }); });
  document.getElementById('pageModal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
  document.getElementById('manualPostModal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
  document.getElementById('sheetEditModal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
  renderCurrentView();
  if (APP.autoInterval) clearInterval(APP.autoInterval);
  APP.autoInterval = setInterval(checkSchedules, 30000);
  setInterval(() => { document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('en-US', {hour12: false}); }, 1000);
  document.getElementById('dataVersion').textContent = `💾 v${APP.dataVersion}`;
  const status = document.createElement('span'); status.className = 'data-status'; status.textContent = `💾 ${APP.pages.length} pages saved`; document.querySelector('.logo').appendChild(status);
}

// ==================== STARTUP ====================
const sess = localStorage.getItem('fbSession');
if (sess) { try { const s = JSON.parse(sess); if (Date.now() - s.time < 86400000) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('appScreen').classList.add('logged-in'); document.getElementById('loggedUserDisplay').textContent = '👤 ' + s.phone; initApp(); } else { localStorage.removeItem('fbSession'); } } catch(e) { localStorage.removeItem('fbSession'); } }

setInterval(() => { saveState(); }, 10000);
window.addEventListener('beforeunload', () => { saveState(); });
</script>
